<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <title>{{ page_title }} | CommerceHub</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-icon">CH</div>
            <div>
                <strong>CommerceHub</strong>

            </div>
        </div>

        <nav>

            <a href="/produtos">Produtos</a>

            <a href="/anuncios">Anúncios</a>
            <a href="/api/health" target="_blank">API Health</a>

    <main class="content">

            <div>
                <h1>{{ page_title }}</h1>
                <p>Fornecedor Simulado → CommerceHub → Mercado Livre</p>
            </div>
        </header>

        {% block content %}{% endblock %}
